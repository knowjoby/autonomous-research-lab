name: 🧠 Autonomous Research Cycle

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual triggers
  push:
    branches: [ main ]
    paths:
      - 'config/**'
      - 'scripts/**'
      - '!**.md'

# Give necessary permissions
permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: read

# Prevent recursive workflows
env:
  SKIP_CI: true

jobs:
  research-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create directories if missing
        run: |
          mkdir -p content/topics
          mkdir -p content/hypotheses
          mkdir -p content/evidence
          mkdir -p site

      - name: Phase 1 - Discovery
        run: node scripts/discovery/runner.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # Don't fail if discovery has issues

      - name: Phase 2 - Hypothesis Generation
        run: node scripts/hypothesis/generator.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Phase 3 - Evidence Collection
        run: node scripts/evidence/collector.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Phase 4 - Simple Validation
        run: |
          echo "🔄 Validation phase - creating summary"
          node -e "
            const fs = require('fs');
            const date = new Date().toISOString().split('T')[0];
            const summary = {
              timestamp: new Date().toISOString(),
              status: 'validation complete',
              files_processed: []
            };
            
            // Check if hypothesis exists
            const hypPath = \`./content/hypotheses/\${date}/hypothesis.json\`;
            if (fs.existsSync(hypPath)) {
              summary.files_processed.push('hypothesis.json');
            }
            
            fs.mkdirSync('./content/validation', { recursive: true });
            fs.writeFileSync(\`./content/validation/\${date}.json\`, JSON.stringify(summary, null, 2));
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Phase 5 - Site Generation
        run: node scripts/publish/site-generator.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest.json for the site
        run: |
          node -e "
            const fs = require('fs');
            const date = new Date().toISOString().split('T')[0];
            const research = [];
            
            // Try to load today's hypothesis
            try {
              const hypPath = \`./content/hypotheses/\${date}/hypothesis.json\`;
              if (fs.existsSync(hypPath)) {
                const hyp = JSON.parse(fs.readFileSync(hypPath, 'utf8'));
                research.push({
                  ...hyp,
                  evidence_count: 0,
                  generated_at: hyp.generated_at || new Date().toISOString()
                });
              }
            } catch (e) {
              console.log('No hypothesis found for today');
            }
            
            // Create latest.json in site folder
            fs.mkdirSync('./site/content', { recursive: true });
            fs.writeFileSync('./site/content/latest.json', JSON.stringify({
              research: research,
              last_update: new Date().toISOString()
            }, null, 2));
          "

      - name: Commit and push changes
        run: |
          git config --global user.name "research-bot[bot]"
          git config --global user.email "research-bot[bot]@users.noreply.github.com"
          
          # Add all content changes
          git add content/ site/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📚 Research update: $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          keep_files: true
          full_commit_message: "🚀 Deploy research site: $(date +'%Y-%m-%d %H:%M UTC')"
